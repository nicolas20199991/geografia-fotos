<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotos do progresso</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Fotos do nosso progresso no trabalho</h1>
        <p>mais de 25 fotos</p>
    </header>

    <main class="gallery" id="gallery">
        <!-- As fotos serão inseridas aqui pelo JavaScript -->
    </main>

    <!-- Modal para ver a foto ampliada -->
    <div id="modal" class="modal" onclick="closeModal()">
        <span class="close">&times;</span>
        <img class="modal-content" id="img-modal">
    </div>

    <script src="script.js"></script>
</body>
</html>
